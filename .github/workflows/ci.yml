name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile
        run: python -m compileall -q resolve_scout

      - name: Unit tests
        run: python -m unittest discover -s tests -v

      - name: Doctor
        run: python -m resolve_scout doctor

      - name: Offline demo
        run: python -m resolve_scout demo --output .artifacts/demo
